<div class="container pt-4" style="margin-top:100px; margin-bottom:100px;">

    <div class="row">

        <div class="col-md-3"></div>

        <div class="col-md-6">

            <div class="card">

                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary pb-3" *ngIf="!form.data.id">
                        Add Result
                    </h3>

                    <h3 class="text-center text-primary pb-3" *ngIf="form.data.id>0">
                        Update Result
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <form>

                        <!-- RESULT CODE -->
                        <label>
                            <b>Result Code</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="resultCode"
                                [(ngModel)]="form.data.resultCode"
                                placeholder="Enter result code">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.resultCode}}</span>
                        </div>

                        <!-- STUDENT NAME -->
                        <label class="mt-2">
                            <b>Student Name</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="studentName"
                                [(ngModel)]="form.data.studentName"
                                placeholder="Enter student name">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.studentName}}</span>
                        </div>

                        <!-- MARKS -->
                        <label class="mt-2">
                            <b>Marks</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="number" class="form-control" name="marks"
                                [(ngModel)]="form.data.marks"
                                placeholder="Enter marks">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.marks}}</span>
                        </div>

                        <!-- RESULT STATUS -->
                        <label class="mt-2">
                            <b>Result Status</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-3">
                            <select class="form-control" name="resultStatus"
                                [(ngModel)]="form.data.resultStatus">

                                <option value="undefined">------------Select------------</option>
                                <option value="Pass">Pass</option>
                                <option value="Fail">Fail</option>

                            </select>
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.resultStatus}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button *ngIf="!form.data.id" type="button" class="btn btn-success"
                                (click)="submit()">
                                Save
                            </button>

                            &nbsp;

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning"
                                (click)="reset()">
                                Reset
                            </button>

                            <button *ngIf="form.data.id > 0" type="button" class="btn btn-primary"
                                (click)="submit()">
                                Update
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-md-3"></div>

    </div>

</div>
