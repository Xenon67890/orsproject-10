<div class="container pt-4" style="margin-top:100px; margin-bottom:100px;">

    <div class="row">

        <div class="col-md-3"></div>

        <div class="col-md-6">

            <div class="card">

                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary pb-3" *ngIf="!form.data.id">
                        Add Health
                    </h3>

                    <h3 class="text-center text-primary pb-3" *ngIf="form.data.id>0">
                        Update Health
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <form>

                        <!-- RESULT CODE -->
                        <label>
                            <b>Health Code</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="healthCode"
                                [(ngModel)]="form.data.healthCode"
                                placeholder="Enter result code">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.healthCode}}</span>
                        </div>

                        <!-- STUDENT NAME -->
                        <label class="mt-2">
                            <b>CPU Usage</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="cpuUsage"
                                [(ngModel)]="form.data.cpuUsage"
                                placeholder="Enter student name">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.cpuUsage}}</span>
                        </div>

                        <!-- MARKS -->
                        <label class="mt-2">
                            <b>Memory Usage</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="memoryUsage"
                                [(ngModel)]="form.data.memoryUsage"
                                placeholder="Enter marks">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.memoryUsage}}</span>
                        </div>

                        <!-- RESULT STATUS -->
                        <label class="mt-2">
                            <b>Health Status</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="healthStatus"
                                [(ngModel)]="form.data.healthStatus"
                                placeholder="Enter marks">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.healthStatus}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button *ngIf="!form.data.id" type="button" class="btn btn-success"
                                (click)="submit()">
                                Save
                            </button>

                            &nbsp;

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning"
                                (click)="reset()">
                                Reset
                            </button>

                            <button *ngIf="form.data.id > 0" type="button" class="btn btn-primary"
                                (click)="submit()">
                                Update
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-md-3"></div>

    </div>

</div>
