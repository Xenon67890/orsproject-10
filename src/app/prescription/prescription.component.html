<div class="container pt-4" style="margin-top:100px; margin-bottom:100px;">

    <div class="row">
        <div class="col-md-3"></div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary pb-3" *ngIf="!form.data.id">
                        Add Prescription
                    </h3>

                    <h3 class="text-center text-primary pb-3" *ngIf="form.data.id > 0">
                        Update Prescription
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        {{form.message}}
                    </div>

                    <form>

                        <!-- PATIENT NAME -->
                        <label>
                            <b>Patient Name</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="patientName"
                                [(ngModel)]="form.data.patientName"
                                placeholder="Enter patient name">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.patientName}}</span>
                        </div>

                        <!-- DOCTOR NAME -->
                        <label class="mt-2">
                            <b>Doctor Name</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="doctorName"
                                [(ngModel)]="form.data.doctorName"
                                placeholder="Enter doctor name">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.doctorName}}</span>
                        </div>

                        <!-- PRESCRIBED DATE -->
                        <label class="mt-2">
                            <b>Prescribed Date</b> <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-3">
                            <input type="date" class="form-control" name="prescribedDate"
                                [(ngModel)]="form.data.prescribedDate">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.prescribedDate}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button *ngIf="!form.data.id" type="button"
                                class="btn btn-success" (click)="submit()">
                                Save
                            </button>

                            &nbsp;

                            <button *ngIf="!form.data.id" type="button"
                                class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>

                            <button *ngIf="form.data.id > 0" type="button"
                                class="btn btn-primary" (click)="submit()">
                                Update
                            </button>

                        </div>

                    </form>

                </div>
            </div>
        </div>

        <div class="col-md-3"></div>
    </div>

</div>
