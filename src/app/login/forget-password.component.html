<div align="center" style="margin-top: 200px;;"  >

    <h2 align="center" style="margin-bottom: 5px; color: navy">Forget Password</h2>

    <div style="height: 20px; margin-bottom: 5px; text-align: center;">
        <h5 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h5>
        <h5 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h5>
    </div>

    <table>
        <tr>
            <th align="left">Login Id<span style="color: red">*</span></th>
            <td><input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="Enter Login ID"></td>
            <td><button (click)="submit()">Go</button></td>
            <td style="position: fixed; color: red;">{{form.inputerror.loginId}}</td>
        </tr>
    </table>
</div>
